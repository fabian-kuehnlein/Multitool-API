name: Build and Test

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-dotnet-api:
    name: Build and Test .NET API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ./MultitoolApi.csproj

      - name: Build
        run: dotnet build ./MultitoolApi.csproj --configuration Release --no-restore

      # - name: Run tests
      #   run: dotnet test ./MultitoolApi.csproj --no-build --verbosity normal